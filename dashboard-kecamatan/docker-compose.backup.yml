version: '3.8'
services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: dashboard-kecamatan-app
    container_name: dashboard-kecamatan-app
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: dashboard-kecamatan-db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: dashboard_kecamatan
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
      - ./_migration/database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: dashboard-kecamatan-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n Service
  n8n:
    image: n8nio/n8n:latest
    container_name: dashboard-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_RUNNERS_ENABLED=false
      - N8N_RUNNERS_TASK_ENV_ALLOW_LIST=WHATSAPP_API_TOKEN,DASHBOARD_URL
      - N8N_ENV_ALLOWLIST=WHATSAPP_API_TOKEN,DASHBOARD_URL
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - DASHBOARD_URL=http://dashboard-kecamatan-nginx
    volumes:
      - n8n_data_dashboard:/home/node/.n8n
    networks:
      - app-network
    depends_on:
      nginx:
        condition: service_healthy

# Docker Networks - Simplified to single internal network
networks:
  app-network:
    driver: bridge

# Volumes
volumes:
  dbdata:
    driver: local
  n8n_data_dashboard:
    driver: local
