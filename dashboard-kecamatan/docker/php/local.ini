; PHP Configuration untuk Performance Optimization
; Location: docker/php/local.ini

; === MEMORY & EXECUTION ===
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; === OPCACHE (Critical untuk performance) ===
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0          ; Production ONLY (no file check)
opcache.revalidate_freq = 0               ; Production ONLY
opcache.fast_shutdown = 1
opcache.enable_cli = 0

; === FILE UPLOAD ===
upload_max_filesize = 100M
post_max_size = 100M

; === ERROR LOGGING (Production) ===
display_errors = Off
log_errors = On
error_log = /var/log/php-fpm.log

; === TIMEZONE ===
date.timezone = Asia/Jakarta

; === SESSION ===
session.gc_maxlifetime = 1440

; === JSON ===
json.max_depth = 512
