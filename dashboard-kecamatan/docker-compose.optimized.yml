version: '3.8'

services:

  # PHP Service - optimized
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.optimized
    image: dashboard-kecamatan-app:v1-alpine
    container_name: dashboard-kecamatan-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: prod
    volumes:
      - ./app:/var/www/app:ro  # hanya app directory, read-only
      - ./routes:/var/www/routes:ro
      - ./config:/var/www/config:ro
      - ./public:/var/www/public:ro
      - ./storage:/var/www/storage  # hanya storage folder untuk logs
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MySQL Service - lightweight alpine version
  db:
    image: mysql:8.0-alpine
    container_name: dashboard-kecamatan-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: dashboard_kecamatan
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
      - ./_migration/database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: dashboard-kecamatan-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/:ro
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n Service - dengan tag spesifik
  n8n:
    image: n8nio/n8n:1.67.0
    container_name: dashboard-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_RUNNERS_ENABLED=false
      - N8N_RUNNERS_TASK_ENV_ALLOW_LIST=WHATSAPP_API_TOKEN,DASHBOARD_URL
      - N8N_ENV_ALLOWLIST=WHATSAPP_API_TOKEN,DASHBOARD_URL
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - DASHBOARD_URL=http://dashboard-kecamatan-nginx
    volumes:
      - n8n_data_dashboard:/home/node/.n8n
    networks:
      - app-network
    depends_on:
      nginx:
        condition: service_healthy

# Docker Networks
networks:
  app-network:
    driver: bridge

# Volumes
volumes:
  dbdata:
    driver: local
  n8n_data_dashboard:
    driver: local
