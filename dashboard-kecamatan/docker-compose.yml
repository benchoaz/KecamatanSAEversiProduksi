services:
  # ============================================================
  # MySQL Database - Optimized with proper configuration
  # ============================================================
  db:
    image: mysql:8.0
    container_name: dashboard-kecamatan-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: dashboard_kecamatan
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-user}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=200 --innodb_buffer_pool_size=256M --innodb_log_file_size=64M --innodb_flush_log_at_trx_commit=2 --innodb_flush_method=O_DIRECT

  # ============================================================
  # Redis - For caching and session management
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: dashboard-kecamatan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ============================================================
  # PHP-FPM Application - Using custom Dockerfile with OPcache
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dashboard-kecamatan-app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_MEMORY=256
      - PHP_OPCACHE_MAX_ACCELERATED_FILES=10000
    volumes:
      - ./:/var/www
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Nginx Web Server - Optimized for Laravel
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: dashboard-kecamatan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "6060:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - app-network
    depends_on:
      - app
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # n8n Workflows - WhatsApp automation
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: dashboard-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_ALLOW_ENV_IN_EXPRESSIONS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RUNNERS_TASK_ENV_ALLOW_LIST=WAHA_API_KEY,DASHBOARD_API_TOKEN,WHATSAPP_API_TOKEN,DASHBOARD_URL,PUBLIC_BASE_URL
      - N8N_ENV_ALLOWLIST=WAHA_API_KEY,DASHBOARD_API_TOKEN,WHATSAPP_API_TOKEN,DASHBOARD_URL,PUBLIC_BASE_URL
      - WAHA_API_KEY=${WAHA_API_KEY}
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - DASHBOARD_URL=http://dashboard-kecamatan-nginx
      - PUBLIC_BASE_URL=${APP_URL}
      - EXECUTIONS_MODE=queue
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app-network
    depends_on:
      - nginx

  # ============================================================
  # WAHA WhatsApp API - Communication hub
  # ============================================================
  waha:
    image: devlikeapro/waha:latest
    container_name: waha-kecamatan
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_API_TOKEN=${WAHA_API_KEY}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_API_KEY}
      - WHATSAPP_START_SESSION=default
      - WHATSAPP_RESTART_ALL_SESSIONS=true
      - WHATSAPP_HOOK_URL=http://dashboard-n8n:5678/webhook/whatsapp-primary
      - WAHA_SESSION_DATA_SAVE=true
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
  redis_data:
  n8n_data:
  waha_sessions:
  nginx_cache:
