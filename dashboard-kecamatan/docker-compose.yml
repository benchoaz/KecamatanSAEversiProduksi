services:
  # ============================================================
  # MySQL Database - Optimized with proper configuration
  # ============================================================
  db:
    image: mysql:8.0
    container_name: kecamatan-db
    restart: unless-stopped
    # ports:
    #   - "3307:3306"
    environment:
      MYSQL_DATABASE: dashboard_kecamatan
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-user}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=200 --innodb_buffer_pool_size=256M --innodb_log_file_size=64M --innodb_flush_log_at_trx_commit=2 --innodb_flush_method=O_DIRECT

  # ============================================================
  # Redis - For caching and session management
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: kecamatan-redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ============================================================
  # PHP-FPM Application - Using custom Dockerfile with OPcache
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kecamatan-app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_MEMORY=256
      - PHP_OPCACHE_MAX_ACCELERATED_FILES=20000
      - SESSION_DRIVER=redis
      - SESSION_DOMAIN=null
    volumes:
      - ./:/var/www
      - ./docker/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Nginx Web Server - Optimized for Laravel
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: kecamatan-nginx
    restart: unless-stopped
    # ports:
    #   - "80:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kecamatan-dashboard.rule=Host(`kecamatanbesuk.my.id`)"
      - "traefik.http.routers.kecamatan-local.rule=Host(`localhost`)"
      - "traefik.http.routers.kecamatan-local.entrypoints=websecure"
      - "traefik.http.routers.kecamatan-local.tls=true"
      - "traefik.http.routers.kecamatan-local.middlewares=kecamatan-compress,kecamatan-rate,kecamatan-buffer,kecamatan-headers"
      - "traefik.http.routers.kecamatan-dashboard.entrypoints=web,websecure"
      - "traefik.http.routers.kecamatan-dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.kecamatan-dashboard.middlewares=kecamatan-compress,kecamatan-rate,kecamatan-buffer,kecamatan-headers"
      - "traefik.http.services.kecamatan-dashboard.loadbalancer.server.port=80"
      
      # Middleware - Compression (Super Fast)
      - "traefik.http.middlewares.kecamatan-compress.compress=true"
      
      # Middleware - Rate Limit (Arus aman, tidak tabrakan)
      - "traefik.http.middlewares.kecamatan-rate.ratelimit.average=100"
      - "traefik.http.middlewares.kecamatan-rate.ratelimit.burst=50"
      
      # Middleware - Buffering (Powerfull & Stable)
      - "traefik.http.middlewares.kecamatan-buffer.buffering.retryExpression=IsNetworkError() && Attempts() <= 2"
      
      # Middleware - Security Headers (Fix Not Secure)
      - "traefik.http.middlewares.kecamatan-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.kecamatan-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.kecamatan-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.kecamatan-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.kecamatan-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.kecamatan-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.kecamatan-headers.headers.frameDeny=true"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
    networks:
      app-network:
        aliases:
          - dashboard-kecamatan-nginx
    depends_on:
      - app
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Laravel Scheduler - Runs schedule:run every minute
  # Handles: desa:sync-demografi (daily) & scrape:desa-news (every 2h)
  # ============================================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kecamatan-scheduler
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction >> /var/www/storage/logs/scheduler.log 2>&1; sleep 60; done"
    volumes:
      - ./:/var/www
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  # ============================================================
  # n8n Workflows - WhatsApp automation
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: kecamatan-n8n
    restart: unless-stopped
    ports:
      - "8085:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_ALLOW_ENV_IN_EXPRESSIONS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RUNNERS_TASK_ENV_ALLOW_LIST=WAHA_API_KEY,DASHBOARD_API_TOKEN,WHATSAPP_API_TOKEN,DASHBOARD_URL,PUBLIC_BASE_URL
      - N8N_ENV_ALLOWLIST=WAHA_API_KEY,DASHBOARD_API_TOKEN,WHATSAPP_API_TOKEN,DASHBOARD_URL,PUBLIC_BASE_URL
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PORT=6379
      - WAHA_API_KEY=${WAHA_API_KEY}
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - WEBHOOK_URL=http://kecamatan-n8n:5678/
      - N8N_SECURE_COOKIE=false
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app-network
    depends_on:
      - nginx

  # ============================================================
  # WAHA WhatsApp API - Communication hub
  # ============================================================
  waha:
    image: devlikeapro/waha:latest
    container_name: waha-kecamatan
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_API_TOKEN=${WAHA_API_KEY}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=${WAHA_API_KEY}
      - WHATSAPP_START_SESSION=default
      - WHATSAPP_RESTART_ALL_SESSIONS=true
      - WAHA_WEBHOOK_ENDPOINT=http://kecamatan-n8n:5678/webhook/whatsapp-primary
      - WAHA_WEBHOOK_EVENTS=message,message.any,session.status
      - WAHA_SESSION_DATA_SAVE=true
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    external: true
    name: kecamatan-network

volumes:
  dbdata:
  redis_data:
  n8n_data:
  waha_sessions:
  nginx_cache:
