services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha-kecamatan
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_API_TOKEN=${WAHA_API_KEY}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_SESSION_DATA_SAVE=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-waha_secret_key_2024}
      # Webhook internal ke n8n di dalam docker network yang sama
      - WAHA_WEBHOOK_ENDPOINT=http://kecamatan-n8n:5678/webhook/whatsapp-primary
      - WAHA_WEBHOOK_EVENTS=message,message.any,session.status
      - WAHA_RESTART_ALL_SESSIONS=true
    volumes:
      - waha_sessions:/app/.sessions
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: kecamatan-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENV_VARS_ALLOWED=WAHA_API_KEY,DASHBOARD_API_TOKEN,LARAVEL_API
      - WAHA_API_KEY=${WAHA_API_KEY}
      - DASHBOARD_API_TOKEN=${API_TOKEN}
      - LARAVEL_API=${LARAVEL_API}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - bot-network
    depends_on:
      - waha
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    name: bot-network
    driver: bridge

volumes:
  n8n_data:
  waha_sessions:
