# ============================================================
# Traefik Dynamic Configuration — Shared Middlewares Only
# Routers & services are handled by Docker labels on each container.
# HTTP→HTTPS redirect is handled by entrypoint command flags.
# ============================================================

http:
  middlewares:
    # --- Compression ---
    kecamatan-compress:
      compress: {}

    # --- Security Headers ---
    kecamatan-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"

    # --- Rate Limiting ---
    kecamatan-rate:
      rateLimit:
        average: 100
        burst: 50

    # --- Retry on Network Error ---
    kecamatan-buffer:
      buffering:
        retryExpression: "IsNetworkError() && Attempts() <= 2"
